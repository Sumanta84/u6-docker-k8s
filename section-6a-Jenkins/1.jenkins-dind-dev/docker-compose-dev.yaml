name: ${COMPOSE_PROJECT_NAME}

services:
  docker-daemon:
    image: docker:dind
    container_name: dind
    privileged: true
    environment:
      - DOCKER_TLS_CERTDIR=/certs
    volumes:
      - jenkins-docker-certs:/certs/client
      - jenkins-data:/var/jenkins_home
    ports:
      - "${DIND_PORT}:2376"
    networks:
      jenkins:
        aliases:
          - docker  #(https://docker:2376)
    command: --storage-driver overlay2

  jenkins-controller:
    image: jenkins
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: jenkins-controller
    restart: on-failure
    environment:
      - DOCKER_HOST=tcp://docker:2376
      - DOCKER_CERT_PATH=/certs/client
      - DOCKER_TLS_VERIFY=1
    volumes:
      - jenkins-docker-certs:/certs/client:ro
      - jenkins-data:/var/jenkins_home
    ports:
      - "${JENKINS_PORT}:8080"
      - "${JENKINS_AGENT}:50000"
    networks:
      - jenkins
 
networks:
  jenkins:
    driver: bridge

volumes:
  jenkins-docker-certs:
  jenkins-data:
